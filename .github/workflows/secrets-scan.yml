name: secrets scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: action/checkout@v4
              with:
                fetch_depth: 0
           
            - name: Run Gitleaks scan
              uses: gitleaks/gitleaks-action@v2 
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github action manage it khud apne aap