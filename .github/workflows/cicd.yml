name: CI/CD Pipeline

on:
 # push:
  #  branches: [main]
  #pull_request:

jobs:

  build:
    name: Build Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."
          sleep 2

      - name: Build Application
        run: |
          echo "Building application..."
          sleep 2
          echo "Build completed!"

  test:
    name: Test Job
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          echo "Running tests..."
          sleep 2
          echo "All tests passed!"

  lint:
    name: Lint Job
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Linter
        run: |
          echo "Checking code style..."
          sleep 2
          echo "No lint issues!"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "Building Docker image..."
          docker build -t myapp:latest .
          echo "Docker image built!"

  deploy:
    name: Deploy Job
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Application
        run: |
          echo "Deploying to production..."
          sleep 2
          echo "Deployment successful!"
