name: dependency  scan 

on:
    workflow_call:

jobs:
    dependency-check:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code 
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
               python-version: "3.12"
            - name: Install pip-audit
              run: pip install pip-audit
  
            - name: Scan dependencies
              run: pip-audit -r requirements.txt