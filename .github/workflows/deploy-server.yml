name: Deploy to EC2

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
     
     
      - name: SSH to prod server & create app folder 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
       
          script: |
            echo "Starting deployement & package install"
            sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
            sudo usermod -aG docker $USER && newgrp docker 
            mkdir -p devops

      - name: Copy docker compose files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          
          source: docker-compose.yml
          target: ~/devops    

      - name: SSH to prod server & run the app 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          
          script: |
            echo "running app"
          
            export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}

            export DOCKER_TAG=${{ github.sha }}
            echo ${{secrets.DOCKERHUB_TOKEN }} | docker login -username ${{ vars.DOCKERHUB_USER }} --password-stdin
            cd ~/devops && docker compose down && docker compose up -d --force-recreate --pull always